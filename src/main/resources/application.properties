# ── Supabase PostgreSQL ────────────────────────────────────────
# Replace [YOUR-PASSWORD] with your actual Supabase database password
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — Optimized for mobile performance
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.test-while-idle=true
spring.datasource.hikari.test-on-borrow=true
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA ────────────────────────────────────────────────────────
# 'update' auto-creates / alters tables — safe for initial Supabase setup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# CRITICAL: disable Spring's own SQL init so data.sql is NOT auto-run
spring.sql.init.mode=never

# ── Thymeleaf ──────────────────────────────────────────────────
spring.thymeleaf.cache=true
spring.thymeleaf.enable-spring-el-compiler=true
spring.thymeleaf.reactive.chunked-mode-view-names=*

# Static resources caching for mobile performance
spring.web.resources.cache.cachecontrol.max-age=7d
spring.web.resources.cache.cachecontrol.cache-public=true

# ── JWT ────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── File Upload ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
app.upload.dir=./uploads/videos
app.thumbnail.dir=./uploads/thumbnails

# ── Cloudinary ─────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── Server ─────────────────────────────────────────────────────
server.port=8080
