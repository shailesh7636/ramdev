# ?? Production Configuration for Render Deployment ????????????
# This file should be used in production environment

# ?? Supabase PostgreSQL (Production) ??????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool ? Production optimized
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.test-while-idle=true
spring.datasource.hikari.test-on-borrow=true
spring.datasource.hikari.connection-test-query=SELECT 1

# ?? JPA Production Settings ????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

spring.sql.init.mode=never

# ?? Thymeleaf Production ????????????????????????????????????????
spring.thymeleaf.cache=true
spring.thymeleaf.enable-spring-el-compiler=true

# Static resources caching
spring.web.resources.cache.cachecontrol.max-age=7d
spring.web.resources.cache.cachecontrol.cache-public=true

# ?? JWT Security ????????????????????????????????????????????????
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ?? Cookie Configuration ??????????????????????????????????????????
app.cookie.secure=true
app.cookie.samesite=Lax

# ?? File Upload (Production) ????????????????????????????????????
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ?? Cloudinary Production ???????????????????????????????????????
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ?? Server Configuration ????????????????????????????????????????
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.http2.enabled=true

# ?? Logging Production ??????????????????????????????????????????
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.com.ramdev=INFO
logging.level.root=WARN

# ?? Security Headers ????????????????????????????????????????????
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict