<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d0f14;
            color: #e8eaf0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #f5c518;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 16px;
            color: #9ca3af;
        }
        .manual-link {
            margin-top: 20px;
            display: none;
        }
        .manual-link a {
            color: #f5c518;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting to dashboard...</p>
        <div class="manual-link" id="manualLink">
            <p>If you are not redirected automatically, <a th:href="${redirectUrl}">click here</a></p>
        </div>
    </div>

    <script>
        // Small delay to ensure cookie is set before redirect
        setTimeout(function() {
            window.location.href = /*[[${redirectUrl}]]*/ '/dashboard';
        }, 500);

        // Show manual link after 3 seconds if redirect doesn't work
        setTimeout(function() {
            document.getElementById('manualLink').style.display = 'block';
        }, 3000);
    </script>
</body>
</html>
