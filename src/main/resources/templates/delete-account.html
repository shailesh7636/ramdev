<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Delete Account — Jai Ramdev Agriculture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      padding: 36px 28px;
      width: 100%;
      max-width: 420px;
    }

    .icon { font-size: 42px; text-align: center; margin-bottom: 12px; }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #1a3a8f;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #777;
      text-align: center;
      margin-bottom: 24px;
    }

    .alert {
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-error   { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6; }
    .alert-success { background: #f0fff4; color: #1a7a3c; border: 1px solid #b2dfcc; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      border: 1.5px solid #d0d7e8;
      border-radius: 10px;
      overflow: hidden;
      background: #f8f9fd;
      margin-bottom: 18px;
    }

    .input-wrap:focus-within { border-color: #1a3a8f; background: #fff; }

    .prefix {
      padding: 0 12px;
      font-size: 13px;
      color: #555;
      white-space: nowrap;
      border-right: 1.5px solid #d0d7e8;
      height: 44px;
      display: flex;
      align-items: center;
    }

    input[type="tel"] {
      border: none;
      outline: none;
      background: transparent;
      padding: 0 12px;
      height: 44px;
      font-size: 15px;
      width: 100%;
      color: #1a1a1a;
    }

    .notice {
      background: #fff8e1;
      border-left: 4px solid #f0a500;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: #555;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    button[type="submit"] {
      width: 100%;
      height: 46px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover { background: #a93226; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #1a3a8f;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">🗑️</div>
  <h1>Delete Account</h1>
  <p class="subtitle">Jai Ramdev Agriculture</p>

  <div th:if="${error}" class="alert alert-error">
    <span>⚠</span>
    <span th:text="${error}"></span>
  </div>

  <div th:if="${success}" class="alert alert-success">
    <span>✓</span>
    <span th:text="${success}"></span>
  </div>

  <div th:if="${success == null}">
    <form th:action="@{/delete-account}" method="post" autocomplete="off">

      <label for="mobile">Registered Mobile Number</label>
      <div class="input-wrap">
        <span class="prefix">📱 +91</span>
        <input id="mobile" type="tel" name="mobile"
               placeholder="10-digit number"
               maxlength="10" inputmode="numeric"
               autofocus autocomplete="off"/>
      </div>

      <div class="notice">
        ⏱ We will delete your account and all associated data within <strong>7 days</strong> of your request.
      </div>

      <button type="submit">Delete My Account</button>

    </form>
  </div>

  <a class="back-link" href="/privacy-policy">← Back to Privacy Policy</a>
</div>

<script>
  document.getElementById('mobile') && document.getElementById('mobile').addEventListener('input', function () {
    this.value = this.value.replace(/\D/g, '').slice(0, 10);
  });
</script>
</body>
</html>
