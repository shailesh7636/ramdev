<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content}, ~{::extraHead}, 'Video Management', 'videos')}">

<th:block th:fragment="extraHead">
<style>
/* ── Upload progress UI ── */
.upload-progress-wrap {
  display: none;
  margin-top: 12px;
}
.upload-progress-wrap.show { display: block; }
.progress-bar-bg {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #3a6fd8, #f5c518);
  border-radius: 10px;
  transition: width 0.3s ease;
}
.progress-label {
  font-size: 12px;
  color: #aaa;
  margin-top: 6px;
  text-align: center;
}
.upload-status {
  font-size: 13px;
  font-weight: 600;
  margin-top: 8px;
  text-align: center;
  min-height: 20px;
}
.upload-status.success { color: #4ade80; }
.upload-status.error   { color: #e05252; }
</style>
</th:block>

<th:block th:fragment="content">

  <div class="two-col">
    <!-- Upload form -->
    <div class="section-card">
      <div class="section-hdr"><h3>📤 Upload Video</h3></div>
      <form id="uploadForm" class="form-stack">
        <div class="field-group">
          <label>Title (English)</label>
          <input type="text" id="title" placeholder="e.g. Ramdev Thresher — Field Demo" required/>
        </div>
        <div class="field-group">
          <label>Title (Gujarati, optional)</label>
          <input type="text" id="titleGuj" placeholder="ગુજરાતી શીર્ષક"
                 style="font-family:'Noto Sans Gujarati',sans-serif"/>
        </div>
        <div class="field-group">
          <label>Category</label>
          <input type="text" id="category" placeholder="e.g. Demo, Overview, Loading"/>
        </div>
        <div class="field-group">
          <label>Description</label>
          <textarea id="description" rows="3" placeholder="Short description..."></textarea>
        </div>
        <div class="field-group">
          <label>Video File (MP4)</label>
          <input type="file" id="videoFile" accept="video/*" required/>
        </div>
        <div class="field-group">
          <label>Thumbnail (optional)</label>
          <input type="file" id="thumbnail" name="thumbnail" accept="image/*"/>
        </div>

        <!-- Progress bar -->
        <div class="upload-progress-wrap" id="progressWrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">0%</div>
          <div class="upload-status" id="uploadStatus"></div>
        </div>

        <button type="submit" class="btn-primary" id="uploadBtn">Upload Video</button>
      </form>

      <!-- Hidden form posted to server after Cloudinary upload -->
      <form id="metaForm" th:action="@{/admin/videos/add}" method="post"
            style="display:none;">
        <input type="hidden" name="title"       id="m_title"/>
        <input type="hidden" name="titleGuj"    id="m_titleGuj"/>
        <input type="hidden" name="description" id="m_description"/>
        <input type="hidden" name="category"    id="m_category"/>
        <input type="hidden" name="videoUrl"    id="m_videoUrl"/>
        <input type="hidden" name="publicId"    id="m_publicId"/>
        <input type="hidden" name="thumbUrl"    id="m_thumbUrl"/>
      </form>
    </div>

    <!-- Video list -->
    <div class="section-card">
      <div class="section-hdr"><h3>All Videos</h3></div>
      <div th:each="v : ${videos}" class="video-admin-row">
        <div class="va-thumb">
          <img th:if="${v.thumbnail}" th:src="${v.thumbnail}" alt="thumb"/>
          <div th:unless="${v.thumbnail}" class="va-no-thumb">▶</div>
        </div>
        <div class="va-info">
          <div class="va-title" th:text="${v.title}">Title</div>
          <div class="va-meta">
            <span th:text="${v.category ?: 'General'}">Cat</span>
            · <span th:text="${#temporals.format(v.createdAt,'dd MMM yy')}">Date</span>
            <span th:if="${v.uploadedBy}"> · by <span th:text="${v.uploadedBy.name}">Uploader</span></span>
          </div>
        </div>
        <div class="va-actions">
          <a th:href="@{/admin/videos/watch/{id}(id=${v.id})}" class="btn-watch-sm">▶ Watch</a>
          <form th:action="@{/admin/videos/delete/{id}(id=${v.id})}" method="post"
                onsubmit="return confirm('Delete this video?')">
            <button type="submit" class="btn-danger-sm">Delete</button>
          </form>
        </div>
      </div>
      <div th:if="${videos == null or videos.empty}" class="empty-cell">No videos yet.</div>
    </div>
  </div>

<script>
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  var videoFile = document.getElementById('videoFile').files[0];
  if (!videoFile) return;

  var btn           = document.getElementById('uploadBtn');
  var progressWrap  = document.getElementById('progressWrap');
  var progressFill  = document.getElementById('progressFill');
  var progressLabel = document.getElementById('progressLabel');
  var uploadStatus  = document.getElementById('uploadStatus');

  btn.disabled = true;
  btn.textContent = 'Uploading...';
  progressWrap.classList.add('show');
  uploadStatus.textContent = '';
  uploadStatus.className = 'upload-status';

  try {
    // Step 1 — get signed params from server
    var sigRes = await fetch('/admin/videos/upload-signature');
    if (!sigRes.ok) throw new Error('Failed to get upload signature');
    var sig = await sigRes.json();

    // Step 2 — upload video directly to Cloudinary with progress tracking
    var videoFormData = new FormData();
    videoFormData.append('file',      videoFile);
    videoFormData.append('api_key',   sig.api_key);
    videoFormData.append('timestamp', sig.timestamp);
    videoFormData.append('signature', sig.signature);
    videoFormData.append('folder',    sig.folder);

    var cloudinaryBase = 'https://api.cloudinary.com/v1_1/' + sig.cloud_name;

    var videoResult = await new Promise(function(resolve, reject) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', cloudinaryBase + '/video/upload');
      xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
          var pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressLabel.textContent = pct + '%';
        }
      };
      xhr.onload = function() {
        if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
        else reject(new Error('Video upload failed: ' + xhr.status));
      };
      xhr.onerror = function() { reject(new Error('Network error during upload')); };
      xhr.send(videoFormData);
    });

    // Step 3 — upload thumbnail directly to Cloudinary if selected
    var thumbUrl = '';
    var thumbFile = document.getElementById('thumbnail').files[0];
    if (thumbFile) {
      uploadStatus.textContent = 'Uploading thumbnail...';
      uploadStatus.className = 'upload-status';

      // get fresh signature for image upload
      var thumbSigRes = await fetch('/admin/videos/upload-signature?type=image');
      if (!thumbSigRes.ok) throw new Error('Failed to get thumbnail signature');
      var thumbSig = await thumbSigRes.json();

      var thumbFormData = new FormData();
      thumbFormData.append('file',      thumbFile);
      thumbFormData.append('api_key',   thumbSig.api_key);
      thumbFormData.append('timestamp', thumbSig.timestamp);
      thumbFormData.append('signature', thumbSig.signature);
      thumbFormData.append('folder',    thumbSig.folder);

      var thumbResult = await new Promise(function(resolve, reject) {
        var xhr2 = new XMLHttpRequest();
        xhr2.open('POST', cloudinaryBase + '/image/upload');
        xhr2.onload = function() {
          if (xhr2.status === 200) resolve(JSON.parse(xhr2.responseText));
          else resolve(null); // non-fatal
        };
        xhr2.onerror = function() { resolve(null); }; // non-fatal
        xhr2.send(thumbFormData);
      });

      if (thumbResult && thumbResult.secure_url) {
        thumbUrl = thumbResult.secure_url;
      }
    }

    // Step 4 — submit metadata to server
    progressFill.style.width = '100%';
    progressLabel.textContent = '100%';
    uploadStatus.textContent = '✓ Upload done! Saving...';
    uploadStatus.className = 'upload-status success';

    document.getElementById('m_title').value       = document.getElementById('title').value;
    document.getElementById('m_titleGuj').value    = document.getElementById('titleGuj').value;
    document.getElementById('m_description').value = document.getElementById('description').value;
    document.getElementById('m_category').value    = document.getElementById('category').value;
    document.getElementById('m_videoUrl').value    = videoResult.secure_url;
    document.getElementById('m_publicId').value    = videoResult.public_id;
    document.getElementById('m_thumbUrl').value    = thumbUrl;

    document.getElementById('metaForm').submit();

  } catch (err) {
    uploadStatus.textContent = '✗ ' + err.message;
    uploadStatus.className = 'upload-status error';
    btn.disabled = false;
    btn.textContent = 'Upload Video';
  }
});
</script>

</th:block>
</html>
