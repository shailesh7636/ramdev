<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{admin/layout :: layout(~{::content}, ~{::extraHead}, 'User Management', 'users')}">
<th:block th:fragment="extraHead"></th:block>
<th:block th:fragment="content">

  <div class="two-col">
    <div class="section-card">
      <div class="section-hdr"><h3>➕ Add New User</h3></div>
      <form th:action="@{/admin/users/add}" method="post" th:object="${createReq}" class="form-stack">
        <div class="field-group">
          <label>Full Name</label>
          <input type="text" th:field="*{name}" placeholder="e.g. Rameshbhai Patel" required/>
        </div>
        <div class="field-group">
          <label>Mobile Number</label>
          <input type="tel" th:field="*{mobile}" placeholder="10-digit number"
                 maxlength="10" minlength="10" pattern="\d{10}"
                 inputmode="numeric" required
                 oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)"
                 title="Please enter exactly 10 digits mobile number"/>
        </div>
        <div class="field-group">
          <label>Role</label>
          <select th:field="*{role}">
            <option value="USER">User (Read-only)</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Add User</button>
      </form>
    </div>

    <div class="section-card">
      <div class="section-hdr"><h3>All Users</h3></div>
      <div class="table-scroll-wrap">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Mobile</th><th>Role</th><th>Action</th></tr>
          </thead>
          <tbody>
            <tr th:each="u : ${users}">
              <td data-label="Name" th:text="${u.name}">Name</td>
              <td data-label="Mobile" th:text="${u.mobile}">Mobile</td>
              <td data-label="Role"><span class="badge-role" th:text="${u.primaryRole}">USER</span></td>
              <td data-label="Action">
                <form th:action="@{/admin/users/delete/{id}(id=${u.id})}" method="post"
                      onsubmit="return confirm('Delete user?')">
                  <button type="submit" class="btn-danger-sm">Delete</button>
                </form>
              </td>
            </tr>
            <tr th:if="${users == null or users.empty}">
              <td colspan="4" class="empty-cell">No users yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</th:block>
</html>
