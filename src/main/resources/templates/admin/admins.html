<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content}, ~{::extraHead}, 'Admin Management', 'admins')}">
<th:block th:fragment="extraHead"></th:block>
<th:block th:fragment="content">

  <div class="two-col">
    <div class="section-card">
      <div class="section-hdr"><h3>➕ Add New Admin</h3></div>
      <form th:action="@{/admin/super/admins/add}" method="post" th:object="${createReq}" class="form-stack">
        <div class="field-group">
          <label>Full Name</label>
          <input type="text" th:field="*{name}" placeholder="e.g. Sureshbhai Shah" required/>
        </div>
        <div class="field-group">
          <label>Mobile Number</label>
          <input type="tel" th:field="*{mobile}" placeholder="10-digit number"
                 maxlength="10" minlength="10" pattern="\d{10}"
                 inputmode="numeric" required
                 oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)"
                 title="Please enter exactly 10 digits"/>
        </div>
        <input type="hidden" th:field="*{role}" value="ADMIN"/>
        <button type="submit" class="btn-primary">Add Admin</button>
      </form>
    </div>

    <div class="section-card">
      <div class="section-hdr"><h3>Current Admins</h3></div>
      <div class="table-scroll-wrap">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Mobile</th><th>Added</th><th>Action</th></tr>
          </thead>
          <tbody>
            <tr th:each="a : ${admins}">
              <td data-label="Name" th:text="${a.name}">Name</td>
              <td data-label="Mobile" th:text="${a.mobile}">Mobile</td>
              <td data-label="Added" th:text="${#temporals.format(a.createdAt,'dd MMM yyyy')}">Date</td>
              <td data-label="Action">
                <form th:action="@{/admin/super/admins/delete/{id}(id=${a.id})}" method="post"
                      onsubmit="return confirm('Remove this admin?')">
                  <button type="submit" class="btn-danger-sm">Remove</button>
                </form>
              </td>
            </tr>
            <tr th:if="${admins == null or admins.empty}">
              <td colspan="4" class="empty-cell">No admins added yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</th:block>
</html>
