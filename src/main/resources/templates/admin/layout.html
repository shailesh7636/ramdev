<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, extraHead, pageTitle, activePage)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title th:text="${pageTitle} + ' — Ramdev'">Ramdev Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;700&family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/dashboard.css}"/>
  <th:block th:replace="${extraHead}"/>
</head>
<body class="dark-shell">

<!-- Sidebar backdrop overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🌾</div>
    <div>
      <div class="brand-name">Ramdev</div>
      <div class="brand-sub">Thresher Portal</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a sec:authorize="hasRole('SUPER_ADMIN')"
       th:href="@{/admin/super/dashboard}"
       class="nav-item"
       th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
      <span class="nav-ico">⬛</span> Dashboard
    </a>
    <a sec:authorize="!hasRole('SUPER_ADMIN')"
       th:href="@{/admin/dashboard}"
       class="nav-item"
       th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
      <span class="nav-ico">⬛</span> Dashboard
    </a>

    <a th:href="@{/admin/videos}" class="nav-item"
       th:classappend="${activePage == 'videos'} ? ' active' : ''">
      <span class="nav-ico">▶</span> Videos
    </a>

    <a th:href="@{/admin/users}" class="nav-item"
       th:classappend="${activePage == 'users'} ? ' active' : ''">
      <span class="nav-ico">👤</span> Users
    </a>

    <a sec:authorize="hasRole('SUPER_ADMIN')"
       th:href="@{/admin/super/admins}" class="nav-item"
       th:classappend="${activePage == 'admins'} ? ' active' : ''">
      <span class="nav-ico">🛡</span> Admins
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-pill">
      <div class="user-avatar" th:text="${me?.name?.substring(0,1) ?: 'A'}">M</div>
      <div>
        <div class="user-name" th:text="${me?.name ?: 'Admin'}">Admin</div>
        <div class="user-role" th:text="${me?.primaryRole ?: 'ADMIN'}">ADMIN</div>
      </div>
    </div>
    <a th:href="@{/logout}" class="logout-btn">⏻ Logout</a>
  </div>
</aside>

<main class="main-content">
  <div class="topbar">
    <button class="menu-toggle" id="menuToggle" aria-label="Open menu" onclick="toggleSidebar()">☰</button>
    <h1 class="page-heading" th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h1>
  </div>

  <div class="content-body">
    <div th:if="${success}" class="flash flash-ok" th:text="${success}"></div>
    <div th:if="${error}"   class="flash flash-err" th:text="${error}"></div>
    <th:block th:replace="${content}"/>
  </div>
</main>

<script th:src="@{/js/dashboard.js}"></script>
<script>
function toggleSidebar() {
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('visible');
  document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
}
function closeSidebar() {
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
  document.body.style.overflow = '';
}
// Close sidebar when a nav link is clicked on mobile
document.querySelectorAll('.nav-item').forEach(function(link) {
  link.addEventListener('click', function() {
    if (window.innerWidth <= 900) closeSidebar();
  });
});
// Close on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeSidebar();
});
</script>
</body>
</html>
