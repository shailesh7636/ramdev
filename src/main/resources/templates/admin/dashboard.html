<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content}, ~{::extraHead}, 'Admin Dashboard', 'dashboard')}">
<th:block th:fragment="extraHead"></th:block>
<th:block th:fragment="content">

  <div class="role-banner admin">
    🔑 Admin View — Users &amp; Videos Management
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-ico">▶</div>
      <div>
        <div class="stat-val" th:text="${videos?.size() ?: 0}">0</div>
        <div class="stat-label">Videos</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-ico">👤</div>
      <div>
        <div class="stat-val" th:text="${users?.size() ?: 0}">0</div>
        <div class="stat-label">Users</div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-hdr">
      <h3>Recent Videos</h3>
      <a th:href="@{/admin/videos}" class="view-all">View all →</a>
    </div>
    <div class="table-scroll-wrap">
      <table class="data-table">
        <thead><tr><th>Title</th><th>Category</th><th>Uploaded</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:each="v,vStat : ${videos}" th:if="${vStat.index < 5}">
            <td data-label="Title" th:text="${v.title}">Title</td>
            <td data-label="Category"><span class="badge-cat" th:text="${v.category ?: 'General'}">Cat</span></td>
            <td data-label="Uploaded" th:text="${#temporals.format(v.createdAt,'dd MMM yyyy')}">Date</td>
            <td data-label="Actions">
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
                <a th:href="@{/admin/videos/watch/{id}(id=${v.id})}" class="btn-watch-sm">▶ Watch</a>
                <form th:action="@{/admin/videos/delete/{id}(id=${v.id})}" method="post"
                      onsubmit="return confirm('Delete?')">
                  <button type="submit" class="btn-danger-sm">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(videos)}">
            <td colspan="4" class="empty-cell">No videos yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</th:block>
</html>
