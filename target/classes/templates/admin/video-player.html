<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::content}, ~{::extraHead}, 'Watch Video', 'videos')}">

<th:block th:fragment="extraHead">
  <style>
    .player-wrap {
      max-width:960px; margin:0 auto 24px;
      background:var(--panel); border-radius:14px;
      overflow:hidden; border:1px solid var(--bdr);
    }
    .protect-bar {
      background:rgba(239,68,68,.12); color:#f87171;
      font-size:.75rem; font-weight:600;
      padding:7px 16px; letter-spacing:.03em;
    }
    /* Fluid video — NEVER overflows container */
    .main-player {
      width:100%; max-width:100%;
      height:auto; max-height:520px;
      background:#000; display:block;
    }
    .player-info   { max-width:960px; margin:0 auto; padding:18px 0 8px; }
    .player-title  { font-size:1.3rem; font-weight:700; margin:0 0 4px; }
    .player-guj    { font-size:1rem; color:var(--muted); margin:0 0 10px; }
    .player-meta   { display:flex; gap:10px; align-items:center; font-size:.8rem; color:var(--muted); margin-bottom:12px; flex-wrap:wrap; }
    .player-desc   { font-size:.88rem; color:var(--muted); line-height:1.6; }
    .back-row      { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .back-row a    { font-size:.83rem; color:var(--accent); text-decoration:none; font-weight:600; }
    .back-row a:hover { text-decoration:underline; }
    .uploader-tag  { font-size:.75rem; background:var(--panel); border:1px solid var(--bdr); border-radius:20px; padding:2px 10px; color:var(--muted); }
    @media (max-width:600px) {
      .main-player { max-height:100%; }
      .player-title { font-size:1.1rem; }
    }
  </style>
</th:block>

<th:block th:fragment="content">

  <div class="back-row">
    <a th:href="@{/admin/videos}">← Back to Videos</a>
  </div>

  <div class="player-wrap">
    <div class="protect-bar">
      🔒 Protected — Download and screen-recording disabled.
    </div>
    <video id="adminPlayer"
           th:src="${video.filePath}"
           controls
           controlsList="nodownload nofullscreen"
           disablePictureInPicture
           oncontextmenu="return false;"
           playsinline
           class="main-player"
           preload="metadata">
      Your browser does not support HTML5 video.
    </video>
  </div>

  <div class="player-info">
    <h1 class="player-title" th:text="${video.title}">Title</h1>
    <p th:if="${video.titleGuj}" class="player-guj"
       style="font-family:'Noto Sans Gujarati',sans-serif;"
       th:text="${video.titleGuj}">ગુજ</p>
    <div class="player-meta">
      <span th:if="${video.category}" class="badge-cat" th:text="${video.category}">Cat</span>
      <span th:text="${#temporals.format(video.createdAt,'dd MMM yyyy')}">Date</span>
      <span th:if="${video.uploadedBy}" class="uploader-tag"
            th:text="'Uploaded by ' + ${video.uploadedBy.name}">Uploader</span>
    </div>
    <p th:if="${video.description}" class="player-desc" th:text="${video.description}">Desc</p>
  </div>

</th:block>
</html>
