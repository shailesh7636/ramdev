<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Denied — Ramdev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d0f14;color:#e8eaf0;
         min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#13161e;border:1px solid rgba(224,82,82,0.3);border-radius:20px;
          padding:48px 40px;max-width:440px;width:90%;text-align:center}
    .icon{font-size:56px;margin-bottom:20px}
    h1{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;
       color:#e05252;margin-bottom:10px}
    p{font-size:14px;color:#9ca3af;line-height:1.7;margin-bottom:28px}
    .btn{display:inline-block;background:#f5c518;color:#0a1628;border-radius:10px;
         padding:13px 28px;font-size:14px;font-weight:700;text-decoration:none;
         font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;transition:opacity .2s}
    .btn:hover{opacity:.88}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>Access Denied</h1>
    <p>You don't have permission to view that page.<br/>
       You have been redirected back to your home page.</p>
    <a th:href="${homeUrl} ?: '/login'" class="btn">← Go to My Dashboard</a>
  </div>
</body>
</html>
