# ── Supabase PostgreSQL ────────────────────────────────────────
# Replace [YOUR-PASSWORD] with your actual Supabase database password
spring.datasource.url=jdbc:postgresql://db.wbhvrcfbvftekngmojqv.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=shailesh@7636
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — Supabase drops idle connections after 10 min
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA ────────────────────────────────────────────────────────
# 'update' auto-creates / alters tables — safe for initial Supabase setup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# CRITICAL: disable Spring's own SQL init so data.sql is NOT auto-run
spring.sql.init.mode=never

# ── Thymeleaf ──────────────────────────────────────────────────
spring.thymeleaf.cache=false

